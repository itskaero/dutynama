name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase secrets into config
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed \
            -e "s|YOUR_API_KEY|${FIREBASE_API_KEY}|g" \
            -e "s|YOUR_AUTH_DOMAIN|${FIREBASE_AUTH_DOMAIN}|g" \
            -e "s|YOUR_PROJECT_ID|${FIREBASE_PROJECT_ID}|g" \
            -e "s|YOUR_STORAGE_BUCKET|${FIREBASE_STORAGE_BUCKET}|g" \
            -e "s|YOUR_MESSAGING_SENDER_ID|${FIREBASE_MESSAGING_SENDER_ID}|g" \
            -e "s|YOUR_APP_ID|${FIREBASE_APP_ID}|g" \
            firebase-config.template.js > firebase-config.js

      - name: Verify no placeholders remain
        run: |
          if grep -qE "YOUR_API_KEY|YOUR_AUTH_DOMAIN|YOUR_PROJECT_ID|YOUR_STORAGE_BUCKET|YOUR_MESSAGING_SENDER_ID|YOUR_APP_ID" firebase-config.js; then
            echo "❌ firebase-config.js still contains placeholder values — check that all secrets are set in repo Settings → Secrets."
            grep -E "YOUR_API_KEY|YOUR_AUTH_DOMAIN|YOUR_PROJECT_ID|YOUR_STORAGE_BUCKET|YOUR_MESSAGING_SENDER_ID|YOUR_APP_ID" firebase-config.js
            exit 1
          fi
          echo "✅ All Firebase config values injected."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

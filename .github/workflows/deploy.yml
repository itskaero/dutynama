name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase secrets into config
        run: |
          sed -i \
            -e "s|YOUR_API_KEY|${FIREBASE_API_KEY}|g" \
            -e "s|YOUR_AUTH_DOMAIN|${FIREBASE_AUTH_DOMAIN}|g" \
            -e "s|YOUR_PROJECT_ID|${FIREBASE_PROJECT_ID}|g" \
            -e "s|YOUR_STORAGE_BUCKET|${FIREBASE_STORAGE_BUCKET}|g" \
            -e "s|YOUR_MESSAGING_SENDER_ID|${FIREBASE_MESSAGING_SENDER_ID}|g" \
            -e "s|YOUR_APP_ID|${FIREBASE_APP_ID}|g" \
            firebase-config.js

      # ── 3. Verify no placeholders remain (fail fast if a secret is missing)
      - name: Verify no placeholders remain
        run: |
          if grep -qE "YOUR_API_KEY|YOUR_AUTH_DOMAIN|YOUR_PROJECT_ID|YOUR_STORAGE_BUCKET|YOUR_MESSAGING_SENDER_ID|YOUR_APP_ID" firebase-config.js; then
            echo "❌ firebase-config.js still contains placeholder values — check that all secrets are set."
            grep -E "YOUR_API_KEY|YOUR_AUTH_DOMAIN|YOUR_PROJECT_ID|YOUR_STORAGE_BUCKET|YOUR_MESSAGING_SENDER_ID|YOUR_APP_ID" firebase-config.js
            exit 1
          fi
          echo "✅ All Firebase config values injected."

      # ── 4a. Deploy to Firebase Hosting ─────────────────────────────────
      #        Requires FIREBASE_SERVICE_ACCOUNT secret (JSON key) and a
      #        firebase.json file. Uncomment this block when ready.
      #
      # - name: Deploy to Firebase Hosting
      #   uses: FirebaseExtended/action-hosting-deploy@v0
      #   with:
      #     repoToken:          ${{ secrets.GITHUB_TOKEN }}
      #     firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      #     channelId:          live
      #     projectId:          ${{ secrets.FIREBASE_PROJECT_ID }}

      # ── 4b. Deploy to GitHub Pages ──────────────────────────────────────
      #        Copies all files to the gh-pages branch.
      #        Enable GitHub Pages (Settings → Pages → Deploy from branch: gh-pages)
      #        and uncomment this block when ready.
      #
      # - name: Deploy to GitHub Pages
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir:  ./
      #     exclude_assets: '.github,README.md'
